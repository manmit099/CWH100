    * {

    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-hover: #151515;
      --border: #2a2a2a;
      --blue: #5f8cff;
      --blue-glow: rgba(95, 140, 255, 0.2);
      --yellow: #ffd966;
      --red: #f87171;
      --green: #6fcf97;
      --text-primary: #f0f0f0;
      --text-secondary: #b0b3b8;
      --code-bg: #0a0a0a;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Syne', sans-serif;
    }

    /* light theme overrides – added without touching original selectors */
    .light-mode {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #f1f5f9;
      --border: #cbd5e1;
      --blue: #2563eb;
      --blue-glow: rgba(37, 99, 235, 0.2);
      --yellow: #fbbf24;
      --red: #ef4444;
      --green: #10b981;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --code-bg: #f1f5f9;
      --shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.2);
    }

    /* adjust day pill and other components for light mode */
    .light-mode .day-pill {
      background: linear-gradient(145deg, #e2e8f0, #cbd5e1);
      color: var(--blue);
      border-color: var(--blue);
      box-shadow: 0 0 12px rgba(37, 99, 235, 0.25);
    }

    .light-mode .concept-card {
      background: var(--surface);
    }

    .light-mode .code-card {
      background: var(--surface);
    }

    .light-mode .output-area {
      background: #eef2f6;
      color: #1e293b;
    }

    .light-mode .syntax-table th {
      background: #e2e8f0;
    }

    .light-mode .step-badge {
      background: linear-gradient(145deg, #e2e8f0, #cbd5e1);
      color: var(--blue);
    }

    .light-mode .step-badge.tip-badge {
      color: #b45309;
      border-color: #fbbf24;
    }

    .light-mode .step-badge.warn-badge {
      color: #b91c1c;
      border-color: #ef4444;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--sans);
      line-height: 1.6;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease, color 0.2s ease;
    }

    html {

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #3a3f4a; border-radius: 20px; }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* header – now scrolls with page (non‑sticky) */
    header {

      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding: 12px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      width: 100%;
    }

    .light-mode header {
      background: rgba(255, 255, 255, 0.7);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .snake-icon {
      font-size: 28px;
      background: linear-gradient(135deg, #4584b6 0%, #4584b6 40%, #ffde57 60%, #ffde57 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 4px rgba(69,132,182,0.6));
    }

    /* ----- theme toggle button (matches day pill radius) ----- */
    .theme-toggle {
      margin-right: 8px;  /* breathing space before header-right */
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .theme-toggle i {
      font-size: 16px;
    }

    /* right side group: day pill + logos + separator */
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
    }

    .circular-logo {
      width: 36px;
      height: 36px;
      border-radius: 40px; /* match day-pill border-radius */
      object-fit: cover;
      border: 2px solid var(--blue);
      box-shadow: 0 0 8px var(--blue-glow);
      background: var(--surface);
    }

    .day-pill {
      background: linear-gradient(145deg, #1f2535, #131725);
      border: 1px solid var(--blue);
      color: var(--blue);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 40px;
      box-shadow: 0 0 12px rgba(95,140,255,0.3);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .day-pill:hover {
      background: #1f2a3f;
      transform: scale(1.02);
    }

    /* separator X between logos */
    .separator-x {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 40px; /* same pill shape */
      background: rgba(95,140,255,0.1);
      border: 1px solid var(--blue);
      color: var(--blue);
      font-size: 14px;
      font-weight: bold;
      font-family: var(--mono);
      box-shadow: 0 0 6px var(--blue-glow);
    }

      padding: 64px 0 40px;
      text-align: center;
