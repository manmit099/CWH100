<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Python Day 4 \u2014 Study Notes</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #191d27;
    --border: #252a38;
    --py-blue: #4fc3f7;
    --py-yellow: #ffd54f;
    --py-green: #69f0ae;
    --py-red: #ff5252;
    --py-purple: #ce93d8;
    --text: #e8eaf0;
    --muted: #7a8099;
    --accent: #4fc3f7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 3rem 0 2.5rem;
    position: relative;
  }

  .badge {
    display: inline-block;
    background: rgba(79,195,247,0.12);
    border: 1px solid rgba(79,195,247,0.3);
    color: var(--py-blue);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    padding: 0.35rem 1rem;
    border-radius: 100px;
    margin-bottom: 1.2rem;
    animation: fadeDown 0.5s ease;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.1;
    animation: fadeDown 0.6s ease;
  }

  header h1 span { color: var(--py-blue); }

  header p {
    color: var(--muted);
    margin-top: 0.8rem;
    font-size: 0.95rem;
    animation: fadeDown 0.7s ease;
  }

  /* PROGRESS */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--py-blue), var(--py-purple));
    width: 0%;
    transition: width 0.1s;
    z-index: 100;
  }

  /* NAV PILLS */
  .nav-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin: 2rem 0;
    animation: fadeUp 0.7s ease;
  }

  .nav-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 0.4rem 0.9rem;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .nav-pill:hover, .nav-pill.active {
    background: rgba(79,195,247,0.1);
    border-color: var(--py-blue);
    color: var(--py-blue);
  }

  /* SECTION CARDS */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.5rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }

  .section-header:hover { background: rgba(255,255,255,0.03); }

  .section-title {
    display: flex;
    align-items: center;
    gap: 0.9rem;
  }

  .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
  }

  .section-title h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
  }

  .chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.3s;
  }

  .section.open .chevron { transform: rotate(180deg); }

  .section-body {
    display: none;
    padding: 0 1.5rem 1.5rem;
    border-top: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  .section.open .section-body { display: block; }

  /* COLOR CODING per section */
  .s1 .section-title h2 { color: var(--py-blue); }
  .s2 .section-title h2 { color: var(--py-purple); }
